<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MORADA DO SOL — Registros Limpeza Imóveis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:#f1f5f9; margin:0; }
    .navbar { background:#0d1829; color:#fff; }
    table { border-collapse:collapse; width:100%; }
    th { background:#1e293b; color:#94a3b8; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:10px 12px; text-align:left; }
    td { padding:10px 12px; border-bottom:1px solid #e2e8f0; vertical-align:middle; font-size:13px; }
    tr:hover td { background:#f8fafc; }
    .spinner { width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#3388f5;border-radius:50%;animation:spin .7s linear infinite;margin:40px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .btn-sm { font-size:11px; padding:4px 10px; border-radius:5px; border:none; cursor:pointer; font-weight:500; transition:opacity .15s; }
    .btn-sm:hover { opacity:.85; }
    .btn-edit   { background:#3b82f6; color:#fff; }
    .btn-delete { background:#ef4444; color:#fff; }
    .badge-aberto    { background:#fef3c7; color:#92400e; border:1px solid #fde68a; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .badge-concluido { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  
      @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect,useRef } = React;
const API = 'http://reserva.imbmoradadosol.online/api';
function getToken() { return localStorage.getItem('iw_token'); }
function authHeaders(){ return { Authorization:`Bearer ${getToken()}` }; }

function Navbar() {
  const [cadastrosOpen, setCadastrosOpen] = useState(false);
  const [diversosOpen, setDiversosOpen]   = useState(false);
  const cadastrosRef = useRef(null);
  const diversosRef  = useRef(null);
  const user = JSON.parse(localStorage.getItem('iw_user') || '{}');

  useEffect(() => {
    function handleClickOutside(e) {
      if (cadastrosRef.current && !cadastrosRef.current.contains(e.target)) setCadastrosOpen(false);
      if (diversosRef.current  && !diversosRef.current.contains(e.target))  setDiversosOpen(false);
    }
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const menuItems = [
    { label: 'Reservas',   href: './reservas.html' },
    { label: 'Imóveis',    href: './imoveis.html' },
    { label: 'Pessoas',    href: './pessoas.html' },
  ];

  const cadastrosItems = [
    { label: 'Imóveis Tipos', href: './cadastros.html?tipo=tipos' },
    { label: 'Municípios/UF', href: './cadastros.html?tipo=municipios' },
    { label: 'Bancos',        href: './cadastros.html?tipo=bancos' },
  ];

  const diversosItems = [
    { label: 'Limpeza',   href: './limpeza-list.html' },
  ];

  return (
    <nav className="navbar px-6 py-3 flex items-center justify-between shadow-lg">
      <div className="flex items-center gap-6">
        <a href="./login.html" className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <span style={{fontFamily:'Syne,sans-serif',fontWeight:800}} className="text-sm text-white">
            Morada do Sol
          </span>
        </a>
        <div className="hidden md:flex items-center gap-1">
          {menuItems.map(item => (
            <a key={item.label} href={item.href}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${item.label==='Diversos'?'text-blue-400':'text-slate-400 hover:text-white hover:bg-white/10'}`}>
              {item.label}
            </a>
          ))}
          <div className="relative" ref={cadastrosRef}>
            <button onClick={() => setCadastrosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Cadastros
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: cadastrosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {cadastrosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {cadastrosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
          <div className="relative" ref={diversosRef}>
            <button onClick={() => setDiversosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Diversos
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: diversosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {diversosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {diversosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-400">{user.email}</span>
        <button onClick={() => { localStorage.clear(); window.location.href='./login.html'; }}
          className="text-xs px-3 py-1.5 rounded-lg bg-white/10 text-slate-300 hover:bg-white/20 transition-colors">Sair</button>
      </div>
    </nav>
  );
}

function LimpezaList() {
  const urlParams = new URLSearchParams(window.location.search);
  const reservaId = urlParams.get('reserva_id');
  const imovelId  = urlParams.get('imovel_id');

  const [registros, setRegistros] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [imovelInfo, setImovelInfo] = useState(null);

  useEffect(() => {
    async function load() {
      try {
        let url = `${API}/limpeza?`;
        if (reservaId) url += `reserva_id=${reservaId}`;
        if (imovelId)  url += `imovel_id=${imovelId}`;

        const res = await fetch(url, { headers: authHeaders() });
        if (res.status === 401) { window.location.href = './login.html'; return; }
        const data = await res.json();
        setRegistros(data);

        // Pega info do imóvel se tiver
        if (data.length > 0 && data[0].imovel_id) {
          const imRes = await fetch(`${API}/imoveis/${data[0].imovel_id}`, { headers: authHeaders() });
          const imData = await imRes.json();
          setImovelInfo(imData);
        }
      } catch (err) {
        console.error(err);
      } finally {
        setLoading(false);
      }
    }
    load();
  }, [reservaId, imovelId]);

  async function handleDelete(id) {
    if (!confirm('Excluir este registro de limpeza?')) return;
    try {
      await fetch(`${API}/limpeza/${id}`, { method:'DELETE', headers: authHeaders() });
      setRegistros(prev => prev.filter(r => r.id !== id));
    } catch {}
  }

  const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('pt-BR') : '—';
  const fmtBRL  = v => v != null ? `R$ ${Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '—';

  return (
    <div className="min-h-screen bg-slate-100">
      <Navbar/>
      <div className="max-w-screen-xl mx-auto px-4 py-6">
        {/* Header */}
        <div className="mb-5">
          <h1 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>
            Registros Limpeza Imóveis
          </h1>
          <p className="text-sm text-slate-500 mt-1">{registros.length} registro{registros.length !== 1 ? 's' : ''} encontrado{registros.length !== 1 ? 's' : ''}</p>
        </div>

        {/* Botão criar */}
        <div className="mb-4">
          <a href={`./limpeza-form.html${reservaId ? `?reserva_id=${reservaId}` : imovelId ? `?imovel_id=${imovelId}` : ''}`}
            className="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold text-white transition-all"
            style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)', boxShadow:'0 2px 10px rgba(51,136,245,.3)'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Criar Novo Registro
          </a>
        </div>

        {/* Info do imóvel (se houver) */}
        {imovelInfo && (
          <div className="bg-white rounded-xl border border-slate-200 px-5 py-3 mb-4 shadow-sm">
            <div className="flex items-center gap-2">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <div className="text-sm">
                <span className="font-bold text-slate-800">{imovelInfo.codigo}</span>
                <span className="text-slate-500"> - {imovelInfo.tipo} - {imovelInfo.endereco}</span>
                {imovelInfo.proprietario && (
                  <span className="text-slate-600"> - {imovelInfo.proprietario}</span>
                )}
              </div>
            </div>
          </div>
        )}

        {/* Tabela */}
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          {loading ? (
            <div className="py-16 text-center">
              <div className="spinner"></div>
              <p className="text-sm text-slate-400 mt-3">Carregando registros…</p>
            </div>
          ) : registros.length === 0 ? (
            <div className="py-16 text-center">
              <svg className="mx-auto mb-3 text-slate-300" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              <p className="text-slate-400 text-sm">Nenhum registro encontrado.</p>
            </div>
          ) : (
            <div className="overflow-x-auto">
              <table>
                <thead>
                  <tr>
                    <th>Imóvel</th>
                    <th style={{width:80}}>Resultados por página</th>
                    <th>Prestador Serviço</th>
                    <th>Data</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th className="text-right">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  {registros.map(r => (
                    <tr key={r.id}>
                      <td className="text-xs text-slate-700">
                        <span className="font-semibold">{r.imovel_codigo}</span> - {r.imovel_endereco}
                      </td>
                      <td className="text-center">
                        <select className="text-xs border border-slate-200 rounded px-2 py-1">
                          <option>50</option>
                        </select>
                      </td>
                      <td className="text-xs text-slate-600">{r.prestador_nome || '—'}</td>
                      <td className="text-xs text-slate-600">{fmtDate(r.data)}</td>
                      <td className="text-xs text-slate-700 font-medium">{fmtBRL(r.valor)}</td>
                      <td>
                        <span className={r.status === 'Concluído' ? 'badge-concluido' : 'badge-aberto'}>
                          {r.status}
                        </span>
                      </td>
                      <td className="text-right">
                        <div className="flex gap-1 justify-end">
                          <button className="btn-sm btn-edit"   onClick={() => window.location.href=`./limpeza-form.html?id=${r.id}`}>Editar</button>
                          <button className="btn-sm btn-delete" onClick={() => handleDelete(r.id)}>Excluir</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Footer */}
          {!loading && registros.length > 0 && (
            <div className="px-4 py-3 border-t border-slate-100 text-xs text-slate-500 flex items-center justify-between">
              <span>Mostrando 0 até 0 de 0 registros</span>
              <div className="flex gap-1">
                <button className="px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-200 text-slate-400 cursor-not-allowed">Anterior</button>
                <button className="px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-200 text-slate-400 cursor-not-allowed">Próximo</button>
              </div>
            </div>
          )}
        </div>

        {/* Botão Voltar */}
        <div className="mt-6">
          <button onClick={() => window.history.back()}
            className="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Voltar
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LimpezaList/>);
</script>
</body>
</html>
