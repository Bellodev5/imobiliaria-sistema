<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MORADA DO SOL — Detalhes do Imóvel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:#f1f5f9; margin:0; }
    .navbar { background:#0d1829; color:#fff; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:24px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
    .section-title { font-size:15px; font-weight:700; color:#1e293b; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .detail-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:12px; }
    .detail-item { display:flex; flex-direction:column; }
    .detail-label { font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
    .detail-value { font-size:13px; color:#1e293b; font-weight:500; }
    .detail-value-muted { font-size:13px; color:#64748b; }
    .badge-ativo { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; padding:4px 12px; border-radius:6px; font-size:12px; font-weight:600; }
    .badge-inativo { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; padding:4px 12px; border-radius:6px; font-size:12px; font-weight:600; }
    .badge-sim { background:#dbeafe; color:#1e40af; border:1px solid #93c5fd; padding:3px 10px; border-radius:5px; font-size:11px; font-weight:600; }
    .badge-nao { background:#f1f5f9; color:#64748b; border:1px solid #cbd5e1; padding:3px 10px; border-radius:5px; font-size:11px; font-weight:600; }
    .btn-action { display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s;text-decoration:none; }
    .btn-primary { background:linear-gradient(135deg,#1a6bea,#3388f5);color:#fff;box-shadow:0 2px 10px rgba(51,136,245,.3); }
    .btn-primary:hover { transform:translateY(-1px); }
    .btn-secondary { background:#fff;color:#475569;border:1px solid #e2e8f0; }
    .btn-secondary:hover { background:#f8fafc; }
    .spinner { width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3388f5;border-radius:50%;animation:spin .7s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const API = 'http://reserva.imbmoradadosol.online/api';function getToken() { return localStorage.getItem('iw_token'); }
function authHeaders(){ return { Authorization:`Bearer ${getToken()}` }; }

function Navbar() {
  return (
    <nav className="navbar px-6 py-3 flex items-center justify-between shadow-lg">
      <div className="flex items-center gap-2">
        <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <span style={{fontFamily:'Syne,sans-serif',fontWeight:800}} className="text-sm text-white">
            Morada do Sol
        </span>
      </div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-400">{JSON.parse(localStorage.getItem('iw_user')||'{}').email}</span>
        <button onClick={() => { localStorage.clear(); window.location.href='./login.html'; }}
          className="text-xs px-3 py-1.5 rounded-lg bg-white/10 text-slate-300 hover:bg-white/20 transition-colors">Sair</button>
      </div>
    </nav>
  );
}

function ImovelDetalhes() {
  const urlId = new URLSearchParams(window.location.search).get('id');
  const [imovel, setImovel] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      if (!urlId) { window.location.href = './imoveis.html'; return; }
      setLoading(true);
      try {
        const res = await fetch(`${API}/imoveis/${urlId}`, {headers:authHeaders()});
        if (!res.ok) throw new Error();
        const data = await res.json();
        setImovel(data);
      } catch {
        alert('Erro ao carregar imóvel.');
        window.location.href = './imoveis.html';
      } finally {
        setLoading(false);
      }
    }
    load();
  }, [urlId]);

  const fmtBRL = v => v != null ? `R$ ${Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '—';
  const fmtPerc = v => v != null ? `${Number(v).toFixed(2)}%` : '—';
  const fmtBool = v => v ? 'SIM' : 'NÃO';

  if (loading) {
    return (
      <div className="min-h-screen bg-slate-100 flex items-center justify-center">
        <div className="spinner"/>
      </div>
    );
  }

  if (!imovel) return null;

  return (
    <div className="min-h-screen bg-slate-100">
      <Navbar/>
      <div className="max-w-5xl mx-auto px-4 py-6">
        
        {/* Header */}
        <div className="flex items-center justify-between mb-6">
          <div>
            <div className="flex items-center gap-3 mb-2">
              <h1 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>
                Imóvel {imovel.codigo}
              </h1>
              <span className={imovel.ativo ? 'badge-ativo' : 'badge-inativo'}>
                {imovel.ativo ? 'ATIVO' : 'INATIVO'}
              </span>
            </div>
            <p className="text-sm text-slate-500">{imovel.tipo} - {imovel.proprietario}</p>
          </div>
          <a href={`./imovel-form.html?id=${imovel.id}`} className="btn-action btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Editar
          </a>
        </div>

        {/* Identificação */}
        <div className="card">
          <div className="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3388f5" strokeWidth="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
            Identificação
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Código/Referência</span>
              <span className="detail-value">{imovel.codigo}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Tipo</span>
              <span className="detail-value">{imovel.tipo}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Proprietário</span>
              <span className="detail-value">{imovel.proprietario || '—'}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Status</span>
              <span className={imovel.ativo ? 'badge-ativo' : 'badge-inativo'}>
                {imovel.ativo ? 'ATIVO' : 'INATIVO'}
              </span>
            </div>
          </div>
        </div>

        {/* Endereço */}
        <div className="card">
          <div className="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3388f5" strokeWidth="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            Endereço
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">CEP</span>
              <span className="detail-value">{imovel.cep || '—'}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Endereço</span>
              <span className="detail-value">{imovel.endereco || '—'}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Número</span>
              <span className="detail-value">{imovel.numero || '—'}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Complemento</span>
              <span className="detail-value">{imovel.complemento || '—'}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Bairro</span>
              <span className="detail-value">{imovel.bairro || '—'}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Município</span>
              <span className="detail-value">{imovel.cidade || '—'}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Estado</span>
              <span className="detail-value">{imovel.estado || '—'}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Telefone</span>
              <span className="detail-value">{fmtBool(imovel.telefone)}</span>
            </div>
          </div>
        </div>

        {/* Disponibilidade */}
        <div className="card">
          <div className="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3388f5" strokeWidth="2">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
            Disponibilidade & Valores
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Disponível Venda</span>
              <span className={imovel.disponivel_venda ? 'badge-sim' : 'badge-nao'}>
                {fmtBool(imovel.disponivel_venda)}
              </span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Valor Venda</span>
              <span className="detail-value">{fmtBRL(imovel.vlr_venda)}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Disponível Locação</span>
              <span className={imovel.disponivel_locacao ? 'badge-sim' : 'badge-nao'}>
                {fmtBool(imovel.disponivel_locacao)}
              </span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Valor Locação (Diária)</span>
              <span className="detail-value">{fmtBRL(imovel.vlr_locacao)}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Locado</span>
              <span className={imovel.locado ? 'badge-sim' : 'badge-nao'}>
                {fmtBool(imovel.locado)}
              </span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Reservado</span>
              <span className={imovel.reservado ? 'badge-sim' : 'badge-nao'}>
                {fmtBool(imovel.reservado)}
              </span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Vendido</span>
              <span className={imovel.vendido ? 'badge-sim' : 'badge-nao'}>
                {fmtBool(imovel.vendido)}
              </span>
            </div>
          </div>
        </div>

        {/* Comissões */}
        <div className="card">
          <div className="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3388f5" strokeWidth="2">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            Comissões
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Comissão Proprietário</span>
              <span className="detail-value">{fmtPerc(imovel.perc_comissao_proprietario)}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Comissão Corretor</span>
              <span className="detail-value">{fmtPerc(imovel.perc_comissao_corretor)}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Comissão Imobiliária</span>
              <span className="detail-value">{fmtPerc(imovel.perc_comissao_imobiliaria)}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Comissão Terceiros</span>
              <span className="detail-value">{fmtPerc(imovel.perc_comissao_terceiros)}</span>
            </div>
          </div>
        </div>

        {/* Limpeza */}
        <div className="card">
          <div className="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3388f5" strokeWidth="2">
              <path d="M3 6h18M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            </svg>
            Limpeza
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Tipo Limpeza</span>
              <span className="detail-value">{imovel.tipo_limpeza}</span>
            </div>
            <div className="detail-item">
              <span className="detail-label">Taxa Limpeza</span>
              <span className="detail-value">{fmtBRL(imovel.taxa_limpeza)}</span>
            </div>
          </div>
          <div className="detail-row">
            <div className="detail-item">
              <span className="detail-label">Inventário</span>
              <span className={imovel.inventario ? 'badge-sim' : 'badge-nao'}>
                {fmtBool(imovel.inventario)}
              </span>
            </div>
          </div>
        </div>

        {/* Observações */}
        {imovel.obs && (
          <div className="card">
            <div className="section-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3388f5" strokeWidth="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
              Observações
            </div>
            <p className="text-sm text-slate-700 whitespace-pre-wrap">{imovel.obs}</p>
          </div>
        )}

        {/* Botões */}
        <div className="flex items-center justify-between pb-8">
          <a href="./imoveis.html" className="btn-action btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Voltar
          </a>
          <a href={`./imovel-form.html?id=${imovel.id}`} className="btn-action btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Editar Imóvel
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ImovelDetalhes/>);
</script>
</body>
</html>
