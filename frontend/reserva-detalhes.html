<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MORADA DO SOL — Detalhes da Reserva</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:#f1f5f9; margin:0; }
    .navbar { background:#0d1829; color:#fff; }
    .detail-row { display:grid; grid-template-columns:1fr 1fr; }
    .detail-cell { padding:10px 16px; font-size:13px; border-bottom:1px solid #e2e8f0; }
    .detail-cell:nth-child(odd)  { background:#f8fafc; color:#64748b; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
    .detail-cell:nth-child(even) { color:#1e293b; font-weight:500; }
    .detail-row:last-child .detail-cell { border-bottom:none; }
    .badge-confirmada { background:#d1fae5;color:#065f46;border:1px solid #6ee7b7; }
    .badge-aberto     { background:#fef3c7;color:#92400e;border:1px solid #fde68a; }
    .badge-cancelada  { background:#fee2e2;color:#991b1b;border:1px solid #fca5a5; }
    .card { background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:16px; }
    .card-header { padding:14px 20px;border-bottom:1px solid #e2e8f0;background:#fafafa; }
    .spinner { width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#3388f5;border-radius:50%;animation:spin .7s linear infinite;margin:60px auto; }
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-action { display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s; }
    .btn-primary { background:linear-gradient(135deg,#1a6bea,#3388f5);color:#fff; }
    .btn-secondary { background:#fff;color:#475569;border:1px solid #e2e8f0; }
    .btn-secondary:hover { background:#f8fafc; }
    .section-title { font-size:13px;font-weight:700;color:#0f172a;letter-spacing:.01em; }
        @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const API = 'http://reserva.imbmoradadosol.online/api';
function getToken() { return localStorage.getItem('iw_token'); }
function authHeaders(){ return { Authorization:`Bearer ${getToken()}` }; }

function Navbar() {
  const [cadastrosOpen, setCadastrosOpen] = useState(false);
  const [diversosOpen, setDiversosOpen]   = useState(false);
  const cadastrosRef = useRef(null);
  const diversosRef  = useRef(null);
  const user = JSON.parse(localStorage.getItem('iw_user') || '{}');

  useEffect(() => {
    function handleClickOutside(e) {
      if (cadastrosRef.current && !cadastrosRef.current.contains(e.target)) setCadastrosOpen(false);
      if (diversosRef.current  && !diversosRef.current.contains(e.target))  setDiversosOpen(false);
    }
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const menuItems = [
    { label: 'Reservas',   href: './reservas.html' },
    { label: 'Imóveis',    href: './imoveis.html' },
    { label: 'Pessoas',    href: './pessoas.html' },
  ];

  const cadastrosItems = [
    { label: 'Imóveis Tipos', href: './cadastros.html?tipo=tipos' },
    { label: 'Municípios/UF', href: './cadastros.html?tipo=municipios' },
    { label: 'Bancos',        href: './cadastros.html?tipo=bancos' },
  ];

  const diversosItems = [
    { label: 'Limpeza',   href: './limpeza-list.html' },
  ];

  return (
    <nav className="navbar px-6 py-3 flex items-center justify-between shadow-lg">
      <div className="flex items-center gap-6">
        <a href="./login.html" className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <span style={{fontFamily:'Syne,sans-serif',fontWeight:800}} className="text-sm text-white">
            Morada do Sol
          </span>
        </a>
        <div className="hidden md:flex items-center gap-1">
          {menuItems.map(item => (
            <a key={item.label} href={item.href}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${item.label==='Reservas'?'text-blue-400':'text-slate-400 hover:text-white hover:bg-white/10'}`}>
              {item.label}
            </a>
          ))}
          <div className="relative" ref={cadastrosRef}>
            <button onClick={() => setCadastrosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Cadastros
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: cadastrosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {cadastrosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {cadastrosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
          <div className="relative" ref={diversosRef}>
            <button onClick={() => setDiversosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Diversos
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: diversosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {diversosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {diversosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-400">{user.email}</span>
        <button onClick={() => { localStorage.clear(); window.location.href='./login.html'; }}
          className="text-xs px-3 py-1.5 rounded-lg bg-white/10 text-slate-300 hover:bg-white/20 transition-colors">Sair</button>
      </div>
    </nav>
  );
}

function Row({ label, value }) {
  return (
    <div className="detail-row">
      <div className="detail-cell">{label}</div>
      <div className="detail-cell">{value ?? '—'}</div>
    </div>
  );
}

function Detalhes() {
  const urlId = new URLSearchParams(window.location.search).get('id');
  const [r, setR] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  useEffect(() => {
    if (!urlId) { setError('ID não informado.'); setLoading(false); return; }
    fetch(`${API}/reservas/${urlId}`, { headers: authHeaders() })
      .then(res => { if (!res.ok) throw new Error(); return res.json(); })
      .then(d => setR(d))
      .catch(() => setError('Erro ao carregar reserva.'))
      .finally(() => setLoading(false));
  }, [urlId]);

  const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('pt-BR') : '—';
  const fmtBRL  = v => v != null ? `R$ ${Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '—';
  const badgeCls = s => s === 'CONFIRMADA' ? 'badge-confirmada' : s === 'CANCELADA' ? 'badge-cancelada' : 'badge-aberto';

  if (loading) return <div className="min-h-screen bg-slate-100"><Navbar/><div className="spinner"/></div>;
  if (error)   return <div className="min-h-screen bg-slate-100"><Navbar/><div className="max-w-2xl mx-auto py-12 px-4 text-center text-red-500">{error}</div></div>;

  return (
    <div className="min-h-screen bg-slate-100">
      <Navbar/>
      <div className="max-w-3xl mx-auto px-4 py-6">

        {/* Header */}
        <div className="mb-5 flex items-center justify-between">
          <div>
            <h1 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>Detalhes</h1>
            <p className="text-sm text-slate-500 mt-0.5">Reserva/Locação</p>
          </div>
          <span className={`px-3 py-1 rounded-full text-xs font-bold ${badgeCls(r.status)}`}>{r.status}</span>
        </div>

        {/* Locatário header */}
        <div className="bg-primary-600 text-white rounded-xl px-5 py-3 mb-4 flex items-center gap-3" style={{background:'linear-gradient(135deg,#1355d7,#3388f5)'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <div>
            <p className="text-xs opacity-70">Locatário</p>
            <p className="font-semibold text-sm">{r.locatario_nome}</p>
          </div>
        </div>

        {/* Identificação */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Identificação</span>
          </div>
          <Row label="Imóvel"          value={`${r.imovel_codigo} - ${r.imovel_tipo} - ${r.imovel_endereco} - ${r.imovel_proprietario}`}/>
          <Row label="Número Contrato" value={r.numero_contrato}/>
          <Row label="Locatário"       value={r.locatario_nome}/>
          <Row label="Corretor"        value={r.corretor_nome}/>
          <Row label="Fiador"          value={r.fiador_nome}/>
          <Row label="Status"          value={<span className={`px-2 py-0.5 rounded text-xs font-bold ${badgeCls(r.status)}`}>{r.status}</span>}/>
          <Row label="Data Limite"     value={fmtDate(r.data_limite)}/>
          <Row label="Lançamento"      value={r.created_at ? new Date(r.created_at).toLocaleString('pt-BR') : '—'}/>
          <Row label="Período"         value={`${fmtDate(r.data_entrada)} à ${fmtDate(r.data_saida)}`}/>
        </div>

        {/* Valores */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Valores</span>
          </div>
          <Row label="Valor Total"    value={fmtBRL(r.valor_total)}/>
          <Row label="Valor Diária"   value={fmtBRL(r.valor_diaria)}/>
          <Row label="Nº Diárias"     value={r.num_diarias}/>
          <Row label="Tipo Locação"   value={r.tipo_locacao}/>
          <Row label="Adiantamento"   value={fmtBRL(r.adiantamento)}/>
          <Row label="Caução"         value={fmtBRL(r.caucao)}/>
          <Row label="Taxa Limpeza"   value={fmtBRL(r.taxa_limpeza)}/>
        </div>

        {/* Comissões */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Comissões</span>
          </div>
          <Row label="Vlr Com. Prop."    value={fmtBRL(r.vlr_comissao_prop)}/>
          <Row label="Vlr Com. Corr."    value={fmtBRL(r.vlr_comissao_corretor)}/>
          <Row label="Vlr Com. Imob."    value={fmtBRL(r.vlr_comissao_imob)}/>
          <Row label="Vlr Com. Ter."     value={fmtBRL(r.vlr_comissao_terceiros)}/>
          <Row label="% Com. Prop."      value={`${r.perc_comissao_prop}%`}/>
          <Row label="% Com. Corr."      value={`${r.perc_comissao_corretor}%`}/>
          <Row label="% Com. Imob."      value={`${r.perc_comissao_imob}%`}/>
          <Row label="% Com. Ter."       value={`${r.perc_comissao_terceiros}%`}/>
        </div>

        {/* Despesas ; adição futura */}
       
        {/* Obs */}
        {r.obs && (
          <div className="card">
            <div className="card-header"><span className="section-title">Observações</span></div>
            <div className="px-4 py-3 text-sm text-slate-700">{r.obs}</div>
          </div>
        )}

        {/* Footer buttons */}
        <div className="flex items-center justify-between pb-8 mt-2">
          <a href="./reservas.html" className="btn-action btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Voltar
          </a>
          <a href={`./reserva-form.html?id=${urlId}`} className="btn-action btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Editar
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Detalhes/>);
</script>
</body>
</html>
