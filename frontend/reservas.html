<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MORADA DO SOL — Reservas/Locações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:#f1f5f9; margin:0; }
    .navbar { background:#0d1829; color:#fff; }
    .badge-aberto    { background:#fef3c7; color:#92400e; border:1px solid #fde68a; padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600; }
    .badge-confirmada{ background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600; }
    .badge-cancelada { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600; }
    .btn-sm { font-size:11px; padding:3px 8px; border-radius:5px; border:none; cursor:pointer; font-weight:500; transition:opacity .15s; }
    .btn-sm:hover { opacity:.85; }
    .btn-edit   { background:#3b82f6; color:#fff; }
    .btn-detail { background:#6b7280; color:#fff; }
    .btn-delete { background:#ef4444; color:#fff; }
    table { border-collapse:collapse; width:100%; }
    th { background:#1e293b; color:#94a3b8; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:10px 12px; text-align:left; }
    td { padding:10px 12px; border-bottom:1px solid #e2e8f0; vertical-align:top; font-size:13px; }
    tr:hover td { background:#f8fafc; }
    .spinner { width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#3388f5;border-radius:50%;animation:spin .7s linear infinite;margin:40px auto; }
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center; }
    .modal-box { background:#fff;border-radius:16px;padding:28px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .fade-in { animation:fadeIn .2s ease both; }
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API = 'http://reserva.imbmoradadosol.online/api';function getToken() { return localStorage.getItem('iw_token'); }
function authHeaders() { return { 'Content-Type':'application/json', Authorization:`Bearer ${getToken()}` }; }
// Função segura para formatar datas
const formatarData = (dataStr) => {
  if (!dataStr) return '—';
  const parteData = String(dataStr).split('T')[0];
  if (/^\d{4}-\d{2}-\d{2}$/.test(parteData)) {
    const [ano, mes, dia] = parteData.split('-');
    return `${dia}/${mes}/${ano}`;
  }
  return '—';
};
function Navbar() {
  const [cadastrosOpen, setCadastrosOpen] = useState(false);
  const [diversosOpen, setDiversosOpen]   = useState(false);
  const cadastrosRef = useRef(null);
  const diversosRef  = useRef(null);
  const user = JSON.parse(localStorage.getItem('iw_user') || '{}');

  useEffect(() => {
    function handleClickOutside(e) {
      if (cadastrosRef.current && !cadastrosRef.current.contains(e.target)) setCadastrosOpen(false);
      if (diversosRef.current  && !diversosRef.current.contains(e.target))  setDiversosOpen(false);
    }
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const menuItems = [
    { label: 'Reservas',   href: './reservas.html' },
    { label: 'Imóveis',    href: './imoveis.html' },
    { label: 'Pessoas',    href: './pessoas.html' },
    { label: 'Relatórios',    href: './relatorios.html' }
  ];

  const cadastrosItems = [
    { label: 'Imóveis Tipos', href: './cadastros.html?tipo=tipos' },
    { label: 'Municípios/UF', href: './cadastros.html?tipo=municipios' },
    { label: 'Bancos',        href: './cadastros.html?tipo=bancos' },
  ];

  const diversosItems = [
    { label: 'Limpeza',   href: './limpeza-list.html' },
  ];

  return (
    <nav className="navbar px-6 py-3 flex items-center justify-between shadow-lg">
      <div className="flex items-center gap-6">
        <a href="./login.html" className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <span style={{fontFamily:'Syne,sans-serif',fontWeight:800}} className="text-sm text-white">
            Morada do Sol
          </span>
        </a>
        <div className="hidden md:flex items-center gap-1">
          {menuItems.map(item => (
            <a key={item.label} href={item.href}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${item.label==='Reservas'?'text-blue-400':'text-slate-400 hover:text-white hover:bg-white/10'}`}>
              {item.label}
            </a>
          ))}
          <div className="relative" ref={cadastrosRef}>
            <button onClick={() => setCadastrosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Cadastros
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: cadastrosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {cadastrosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {cadastrosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
          <div className="relative" ref={diversosRef}>
            <button onClick={() => setDiversosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Diversos
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: diversosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {diversosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {diversosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-400">{user.email}</span>
        <button onClick={() => { localStorage.clear(); window.location.href='./login.html'; }}
          className="text-xs px-3 py-1.5 rounded-lg bg-white/10 text-slate-300 hover:bg-white/20 transition-colors">Sair</button>
      </div>
    </nav>
  );
}

function ConfirmModal({ msg, onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal-box fade-in" onClick={e=>e.stopPropagation()}>
        <div className="text-center mb-5">
          <div className="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-3">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
            </svg>
          </div>
          <h3 className="text-base font-semibold text-slate-800 mb-1">Confirmar exclusão</h3>
          <p className="text-sm text-slate-500">{msg}</p>
        </div>
        <div className="flex gap-3">
          <button onClick={onCancel} className="flex-1 py-2 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">Cancelar</button>
          <button onClick={onConfirm} className="flex-1 py-2 rounded-lg bg-red-500 text-white text-sm font-semibold hover:bg-red-600 transition-colors">Excluir</button>
        </div>
      </div>
    </div>
  );
}

function ReservasList() {
  const [reservas, setReservas]   = useState([]);
  const [total, setTotal]         = useState(0);
  const [totalPages, setTotalPages] = useState(1);
  const [page, setPage]           = useState(1);
  const [limit, setLimit]         = useState(10);
  const [search, setSearch]       = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [loading, setLoading]     = useState(true);
  const [deleteTarget, setDeleteTarget] = useState(null);

  const fetch_ = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams({ page, limit, search, status: statusFilter });
      const res  = await fetch(`${API}/reservas?${params}`, { headers: authHeaders() });
      if (res.status === 401) { window.location.href = './login.html'; return; }
      const data = await res.json();
      setReservas(data.data || []);
      setTotal(data.total || 0);
      setTotalPages(data.totalPages || 1);
    } catch (err) {
      console.error(err);
    } finally {
      setLoading(false);
    }
  }, [page, limit, search, statusFilter]);

  useEffect(() => { fetch_(); }, [fetch_]);

  useEffect(() => {
    const t = setTimeout(() => setPage(1), 400);
    return () => clearTimeout(t);
  }, [search]);

  async function handleDelete(id) {
    try {
      await fetch(`${API}/reservas/${id}`, { method:'DELETE', headers:authHeaders() });
      setDeleteTarget(null);
      fetch_();
    } catch {}
  }

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
  }
  function formatBRL(v) {
    return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
  }

  const badgeCls = s => s === 'CONFIRMADA' ? 'badge-confirmada' : s === 'CANCELADA' ? 'badge-cancelada' : 'badge-aberto';

  return (
    <div className="min-h-screen bg-slate-100">
      <Navbar />

      <div className="max-w-screen-xl mx-auto px-4 py-6">
        <div className="flex items-center justify-between mb-5">
          <div>
            <h1 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>
              Reservas/Locações
            </h1>
            <p className="text-sm text-slate-500 mt-0.5">{total} registro{total !== 1 ? 's' : ''}</p>
          </div>
          <div className="flex gap-2">
            <a href="./reserva-form.html"
              className="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold text-white transition-all"
              style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)', boxShadow:'0 2px 10px rgba(51,136,245,.3)'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nova Reserva
            </a>
          </div>
        </div>

        <div className="bg-white rounded-xl border border-slate-200 px-4 py-3 mb-4 flex flex-wrap items-center gap-3 shadow-sm">
          <div className="flex items-center gap-2">
            <label className="text-xs text-slate-500 font-medium">Exibir</label>
            <select value={limit} onChange={e=>{setLimit(Number(e.target.value));setPage(1);}}
              className="text-sm border border-slate-200 rounded-lg px-2 py-1.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary-500">
              {[10,25,50,100].map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div className="flex items-center gap-2 flex-1">
            <label className="text-xs text-slate-500 font-medium">Status</label>
            <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}
              className="text-sm border border-slate-200 rounded-lg px-2 py-1.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary-500">
              <option value="">Todos</option>
              <option value="EM ABERTO">EM ABERTO</option>
              <option value="CONFIRMADA">CONFIRMADA</option>
              <option value="CANCELADA">CANCELADA</option>
            </select>
          </div>
          <div className="flex items-center gap-2 flex-1">
            <label className="text-xs text-slate-500 font-medium">Buscar</label>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Locatário, imóvel, contrato..."
              className="flex-1 px-3 py-1.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"/>
          </div>
        </div>

        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          {loading ? (
            <div className="py-16 text-center"><div className="spinner"></div><p className="text-sm text-slate-400 mt-3">Carregando…</p></div>
          ) : reservas.length === 0 ? (
            <div className="py-16 text-center"><p className="text-slate-400 text-sm">Nenhuma reserva encontrada.</p></div>
          ) : (
            <div className="overflow-x-auto">
              <table>
                <thead>
                  <tr>
                    <th>Contrato</th>
                    <th>Locatário</th>
                    <th>Imóvel</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th>Valor Total</th>
                    <th>Status</th>
                    <th className="text-right">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  {reservas.map(r => (
                    <tr key={r.id}>
                      <td className="text-xs font-mono font-semibold text-slate-700">{r.numero_contrato}</td>
                      <td className="text-xs text-slate-700">{r.locatario_nome}</td>
                      <td className="text-xs text-slate-600">{r.imovel_codigo} - {r.imovel_tipo}</td>
                      <td className="text-xs text-slate-600">{formatarData(r.data_entrada)}</td>
                      <td className="text-xs text-slate-600">{formatarData(r.data_saida)}</td>
                      <td className="text-xs text-slate-700 font-semibold">R$ {formatBRL(r.valor_total)}</td>
                      <td>
                        <span className={badgeCls(r.status)}>{r.status}</span>
                      </td>
                      <td className="text-right">
                        <div className="flex gap-1 justify-end">
                          <button className="btn-sm btn-edit"   onClick={() => window.location.href=`./reserva-form.html?id=${r.id}`}>Editar</button>
                          <button className="btn-sm btn-detail" onClick={() => window.location.href=`./reserva-detalhes.html?id=${r.id}`}>Detalhes</button>
                          <button className="btn-sm btn-delete" onClick={() => setDeleteTarget(r)}>Excluir</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>

        {/* Paginação */}
        {totalPages > 1 && (
          <div className="flex items-center justify-between mt-4 px-2">
            <p className="text-xs text-slate-500">
              Página {page} de {totalPages} · {total} registro{total !== 1 ? 's' : ''}
            </p>
            <div className="flex gap-2">
              <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}
                className="px-3 py-1.5 text-xs font-medium border border-slate-200 rounded-lg disabled:opacity-40">
                Anterior
              </button>
              <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}
                className="px-3 py-1.5 text-xs font-medium border border-slate-200 rounded-lg disabled:opacity-40">
                Próxima
              </button>
            </div>
          </div>
        )}
      </div>

      {deleteTarget && (
        <ConfirmModal
          msg={`Excluir reserva #${deleteTarget.numero_contrato} - ${deleteTarget.locatario_nome}?`}
          onConfirm={() => handleDelete(deleteTarget.id)}
          onCancel={() => setDeleteTarget(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ReservasList/>);
</script>
</body>
</html>
