<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MORADA DO SOL — Detalhes da Pessoa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:#f1f5f9; margin:0; }
    .navbar { background:#0d1829; color:#fff; }
    .detail-row { display:grid; grid-template-columns:1fr 1fr; }
    .detail-cell { padding:10px 16px; font-size:13px; border-bottom:1px solid #e2e8f0; }
    .detail-cell:nth-child(odd)  { background:#f8fafc; color:#64748b; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
    .detail-cell:nth-child(even) { color:#1e293b; font-weight:500; }
    .detail-row:last-child .detail-cell { border-bottom:none; }
    .badge-ativo   { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
    .badge-inativo { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.04); margin-bottom:16px; }
    .card-header { padding:14px 20px; border-bottom:1px solid #e2e8f0; background:#fafafa; }
    .spinner { width:28px; height:28px; border:3px solid #e2e8f0; border-top-color:#3388f5; border-radius:50%; animation:spin .7s linear infinite; margin:60px auto; }
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-action { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:9px; font-size:13px; font-weight:600; border:none; cursor:pointer; transition:all .2s; }
    .btn-primary { background:linear-gradient(135deg,#1a6bea,#3388f5); color:#fff; }
    .btn-secondary { background:#fff; color:#475569; border:1px solid #e2e8f0; }
    .btn-secondary:hover { background:#f8fafc; }
    .section-title { font-size:13px; font-weight:700; color:#0f172a; letter-spacing:.01em; }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(-4px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const API = 'http://reserva.imbmoradadosol.online/api';function getToken() { return localStorage.getItem('iw_token'); }
function authHeaders(){ return { Authorization:`Bearer ${getToken()}` }; }
const formatarData = (dataStr) => {
  if (!dataStr) return '—';
  const parteData = String(dataStr).split('T')[0];
  if (/^\d{4}-\d{2}-\d{2}$/.test(parteData)) {
    const [ano, mes, dia] = parteData.split('-');
    return `${dia}/${mes}/${ano}`;
  }
  return '—';
};
function Navbar() {
  const [cadastrosOpen, setCadastrosOpen] = useState(false);
  const [diversosOpen, setDiversosOpen]   = useState(false);
  const cadastrosRef = useRef(null);
  const diversosRef  = useRef(null);
  const user = JSON.parse(localStorage.getItem('iw_user') || '{}');

  useEffect(() => {
    function handleClickOutside(e) {
      if (cadastrosRef.current && !cadastrosRef.current.contains(e.target)) setCadastrosOpen(false);
      if (diversosRef.current  && !diversosRef.current.contains(e.target))  setDiversosOpen(false);
    }
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const menuItems = [
    { label: 'Reservas',   href: './reservas.html' },
    { label: 'Imóveis',    href: './imoveis.html' },
    { label: 'Pessoas',    href: './pessoas.html' },
    { label: 'Relatórios',    href: './relatorios.html' }
  ];


  const cadastrosItems = [
    { label: 'Imóveis Tipos', href: './cadastros.html?tipo=tipos' },
    { label: 'Municípios/UF', href: './cadastros.html?tipo=municipios' },
    { label: 'Bancos',        href: './cadastros.html?tipo=bancos' },
  ];

  const diversosItems = [
    { label: 'Limpeza',   href: './limpeza-list.html' },
  ];

  return (
    <nav className="navbar px-6 py-3 flex items-center justify-between shadow-lg">
      <div className="flex items-center gap-6">
        <a href="./login.html" className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <span style={{fontFamily:'Syne,sans-serif',fontWeight:800}} className="text-sm text-white">
            Morada do Sol
          </span>
        </a>
        <div className="hidden md:flex items-center gap-1">
          {menuItems.map(item => (
            <a key={item.label} href={item.href}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${item.label==='Pessoas'?'text-blue-400':'text-slate-400 hover:text-white hover:bg-white/10'}`}>
              {item.label}
            </a>
          ))}
          <div className="relative" ref={cadastrosRef}>
            <button onClick={() => setCadastrosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Cadastros
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: cadastrosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {cadastrosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {cadastrosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
          <div className="relative" ref={diversosRef}>
            <button onClick={() => setDiversosOpen(v => !v)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1">
              Diversos
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{transform: diversosOpen ? 'rotate(180deg)' : 'rotate(0)', transition:'transform .2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {diversosOpen && (
              <div className="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border border-slate-200 py-1 min-w-[160px] z-50"
                style={{animation:'fadeIn .15s ease'}}>
                {diversosItems.map(item => (
                  <a key={item.label} href={item.href}
                    className="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors font-medium">
                    {item.label}
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-400">{user.email}</span>
        <button onClick={() => { localStorage.clear(); window.location.href='./login.html'; }}
          className="text-xs px-3 py-1.5 rounded-lg bg-white/10 text-slate-300 hover:bg-white/20 transition-colors">Sair</button>
      </div>
    </nav>
  );
}
function Row({ label, value }) {
  return (
    <div className="detail-row">
      <div className="detail-cell">{label}</div>
      <div className="detail-cell">{value ?? '—'}</div>
    </div>
  );
}

function DetalhesPessoa() {
  const urlId = new URLSearchParams(window.location.search).get('id');
  const [pessoa, setPessoa] = useState(null);
  const [bancos, setBancos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  // Carregar bancos
  useEffect(() => {
    fetch(`${API}/bancos`, { headers: authHeaders() })
      .then(res => res.json())
      .then(data => setBancos(Array.isArray(data) ? data : []))
      .catch(() => {});
  }, []);

  useEffect(() => {
    if (!urlId) {
      setError('ID não informado.');
      setLoading(false);
      return;
    }
    fetch(`${API}/pessoas/${urlId}`, { headers: authHeaders() })
      .then(res => {
        if (!res.ok) throw new Error('Erro ao carregar pessoa');
        return res.json();
      })
      .then(data => setPessoa(data))
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, [urlId]);

  const fmtDate = formatarData;
  const fmtDateTime = d => d ? new Date(d).toLocaleString('pt-BR') : '—';
  const badgeCls = ativo => ativo ? 'badge-ativo' : 'badge-inativo';
  const tipoLabel = {
    locatario: 'Locatário',
    corretor: 'Corretor',
    fiador: 'Fiador',
    prestador: 'Prestador de Serviço'
  };
  const simNao = (valor) => valor ? 'SIM' : 'NÃO';
  const estadoCivilLabel = {
    'SOLTEIRO': 'Solteiro(a)',
    'CASADO': 'Casado(a)',
    'DIVORCIADO': 'Divorciado(a)',
    'VIUVO': 'Viúvo(a)'
  };
  const getBancoNome = (bancoId) => {
    if (!bancoId) return '—';
    const banco = bancos.find(b => b.id === bancoId);
    return banco ? `${banco.numero} ${banco.nome_curto}` : String(bancoId);
  };

  if (loading) return <div className="min-h-screen bg-slate-100"><Navbar/><div className="spinner"/></div>;
  if (error)   return <div className="min-h-screen bg-slate-100"><Navbar/><div className="max-w-2xl mx-auto py-12 px-4 text-center text-red-500">{error}</div></div>;

  return (
    <div className="min-h-screen bg-slate-100">
      <Navbar/>
      <div className="max-w-3xl mx-auto px-4 py-6">

        <div className="mb-5 flex items-center justify-between">
          <div>
            <h1 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>Detalhes Pessoa</h1>
            <p className="text-sm text-slate-500 mt-0.5">Informações cadastrais</p>
          </div>
          <span className={`px-3 py-1 rounded-full text-xs font-bold ${badgeCls(pessoa.ativo)}`}>
            {pessoa.ativo ? 'ATIVO' : 'INATIVO'}
          </span>
        </div>

        {/* Cabeçalho com nome */}
        <div className="bg-primary-600 text-white rounded-xl px-5 py-3 mb-4 flex items-center gap-3" style={{background:'linear-gradient(135deg,#1355d7,#3388f5)'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <div>
            <p className="text-xs opacity-70">Nome</p>
            <p className="font-semibold text-sm">{pessoa.nome}</p>
          </div>
        </div>

        {/* Identificação */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Identificação</span>
          </div>
          <Row label="Tipo" value={tipoLabel[pessoa.tipo] || pessoa.tipo} />
          <Row label="CPF/CNPJ" value={pessoa.cpf_cnpj} />
          <Row label="RG/IE" value={pessoa.rg_ie} />
          <Row label="DNI" value={pessoa.dni} />
          <Row label="Estado Civil" value={estadoCivilLabel[pessoa.estado_civil] || pessoa.estado_civil} />
          <Row label="Profissão" value={pessoa.profissao} />
          <Row label="Aniversário" value={fmtDate(pessoa.aniversario)} />
        </div>

        {/* Contato */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Contato</span>
          </div>
          <Row label="E-mail" value={pessoa.email} />
          <Row label="Telefone Comercial" value={pessoa.telefone} />
          <Row label="Telefone Residencial" value={pessoa.tel_residencial} />
          <Row label="Celular" value={pessoa.celular} />
          <Row label="Inscrição" value={pessoa.inscricao} />
          <Row label="Contato" value={pessoa.contato} />
          <Row label="Tel. Contato" value={pessoa.tel_contato} />
        </div>

        {/* Endereço */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Endereço</span>
          </div>
          <Row label="Endereço" value={pessoa.endereco} />
          <Row label="Número" value={pessoa.numero} />
          <Row label="Complemento" value={pessoa.complemento} />
          <Row label="Bairro" value={pessoa.bairro} />
          <Row label="Cidade" value={pessoa.cidade} />
          <Row label="Estado" value={pessoa.estado} />
          <Row label="CEP" value={pessoa.cep} />  {/* Se houver campo cep */}
        </div>

        {/* Tipos (flags) */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Classificação</span>
          </div>
          <Row label="Proprietário" value={simNao(pessoa.proprietario)} />
          <Row label="Locatário" value={simNao(pessoa.locatario)} />
          <Row label="Corretor" value={simNao(pessoa.corretor)} />
          <Row label="Prestador Serviço" value={simNao(pessoa.prestador)} />
          <Row label="Fiador" value={simNao(pessoa.fiador)} />
          <Row label="Restrição" value={simNao(pessoa.restricao)} />
          {pessoa.restricao && pessoa.obs_restricoes && (
            <Row label="Obs. Restrições" value={pessoa.obs_restricoes} />
          )}
        </div>

        {/* Dados Bancários */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Dados Bancários</span>
          </div>
          <Row label="Banco" value={getBancoNome(pessoa.banco_id)} />
          <Row label="Agência" value={pessoa.agencia} />
          <Row label="Conta" value={pessoa.conta} />
          <Row label="Nome da Conta" value={pessoa.nome_conta} />
          <Row label="Chave PIX" value={pessoa.chave_pix} />
        </div>

        {/* Observações */}
        {pessoa.obs && (
          <div className="card">
            <div className="card-header"><span className="section-title">Observações e Restrições</span></div>
            <div className="px-4 py-3 text-sm text-slate-700">Observações: {pessoa.obs}</div>
            <div className="px-4 py-3 text-sm text-slate-700">Restrições: {pessoa.obs_restricoes}</div>
          </div>
        )}

        {/* Datas de controle */}
        <div className="card">
          <div className="card-header">
            <span className="section-title">Controle</span>
          </div>
          <Row label="Criado em" value={fmtDateTime(pessoa.created_at)} />
          <Row label="Atualizado em" value={fmtDateTime(pessoa.updated_at)} />
        </div>

        {/* Botões */}
        <div className="flex items-center justify-between pb-8 mt-2">
          <a href="./pessoas.html" className="btn-action btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Voltar
          </a>
          <a href={`./pessoa-form.html?id=${urlId}`} className="btn-action btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Editar
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DetalhesPessoa/>);
</script>
</body>
</html>
