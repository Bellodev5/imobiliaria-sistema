<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MORADA DO SOL — Login</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- React + ReactDOM + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            primary: {
              50:  '#eef6ff',
              100: '#d9ecff',
              200: '#bcddff',
              300: '#8ec7ff',
              400: '#59a8ff',
              500: '#3388f5',
              600: '#1a6bea',
              700: '#1355d7',
              800: '#1545ae',
              900: '#163d89',
              950: '#122754',
            },
            slate: {
              850: '#172033',
            }
          }
        }
      }
    }
  </script>

  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Syne', sans-serif; }

    body {
      background: #0d1829;
      overflow: hidden;
      height: 100vh;
    }

    /* Animated background grid */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(51,136,245,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(51,136,245,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* Orb glows */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: orbPulse 6s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: #1a6bea; top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: #3388f5; bottom: -80px; right: -60px; animation-delay: 2s; }
    .orb-3 { width: 200px; height: 200px; background: #59a8ff; top: 50%; left: 50%; animation-delay: 4s; }
    @keyframes orbPulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(1.08); }
    }

    /* Card glassmorphism */
    .glass-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        0 0 0 1px rgba(51,136,245,0.12),
        0 32px 64px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Input styles */
    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      transition: all 0.2s;
      outline: none;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.3); }
    .input-field:focus {
      background: rgba(51,136,245,0.08);
      border-color: rgba(51,136,245,0.6);
      box-shadow: 0 0 0 3px rgba(51,136,245,0.15);
    }

    /* Button */
    .btn-primary {
      background: linear-gradient(135deg, #1a6bea 0%, #3388f5 100%);
      box-shadow: 0 4px 24px rgba(51,136,245,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(51,136,245,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Slide-in animation */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both; }
    .delay-1 { animation-delay: 0.08s; }
    .delay-2 { animation-delay: 0.16s; }
    .delay-3 { animation-delay: 0.24s; }
    .delay-4 { animation-delay: 0.32s; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>

<body class="relative flex items-center justify-center min-h-screen">

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- App root -->
  <div id="root" class="relative z-10 w-full"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ─── CONFIG ─── */
    const API_BASE = 'http://reserva.imbmoradadosol.online/api'; // ajustar conforme  servidor

    /* ─── EYE ICON ─── */
    function EyeIcon({ open }) {
      return open ? (
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      ) : (
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      );
    }

    /* ─── MAIN LOGIN COMPONENT ─── */
    function LoginPage() {
      const [email, setEmail]         = useState('');
      const [password, setPassword]   = useState('');
      const [showPass, setShowPass]   = useState(false);
      const [loading, setLoading]     = useState(false);
      const [error, setError]         = useState('');
      const [shake, setShake]         = useState(false);
      const formRef = useRef(null);

      /* Shake animation on error */
      useEffect(() => {
        if (shake) {
          const t = setTimeout(() => setShake(false), 500);
          return () => clearTimeout(t);
        }
      }, [shake]);

      async function handleLogin(e) {
        e.preventDefault();
        if (!email || !password) {
          setError('Preencha e-mail e senha.');
          setShake(true);
          return;
        }
        setLoading(true);
        setError('');

        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha: password }),
          });
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || 'Credenciais inválidas.');
          }

          // Salva token e redireciona
          localStorage.setItem('iw_token', data.token);
          localStorage.setItem('iw_user', JSON.stringify(data.usuario));
          window.location.href = './reservas.html';

        } catch (err) {
          setError(err.message);
          setShake(true);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="flex min-h-screen w-full items-center justify-center px-4">
          <div className="w-full max-w-md">

            {/* Logo / Brand */}
            <div className="animate-slide-up text-center mb-10">
              <div className="inline-flex items-center gap-3 mb-4">
                <div className="w-11 h-11 rounded-xl flex items-center justify-center"
                  style={{background:'linear-gradient(135deg,#1a6bea,#3388f5)', boxShadow:'0 4px 20px rgba(51,136,245,0.4)'}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                  </svg>
                </div>
                <span className="font-display text-2xl font-800 text-white tracking-tight" style={{fontWeight:800}}>
                  Morada do Sol
                </span>
              </div>
              <p className="text-sm" style={{color:'rgba(255,255,255,0.4)'}}>
                Sistema de Locações & Reservas
              </p>
            </div>

            {/* Card */}
            <div ref={formRef} className={`glass-card rounded-2xl p-8 ${shake ? 'shake' : ''}`}>

              <div className="animate-slide-up delay-1 mb-7">
                <h1 className="font-display text-xl font-semibold text-white mb-1"
                    style={{fontWeight:700}}>
                  Bem-vindo de volta
                </h1>
                <p className="text-sm" style={{color:'rgba(255,255,255,0.4)'}}>
                  Faça login para acessar o painel
                </p>
              </div>

              <form onSubmit={handleLogin} autoComplete="off">

                {/* Email */}
                <div className="animate-slide-up delay-2 mb-4">
                  <label className="block text-xs font-medium mb-2"
                    style={{color:'rgba(255,255,255,0.55)', letterSpacing:'0.06em', textTransform:'uppercase'}}>
                    E-mail
                  </label>
                  <input
                    type="email"
                    value={email}
                    onChange={e => setEmail(e.target.value)}
                    placeholder="seu@email.com"
                    className="input-field w-full rounded-xl px-4 py-3 text-sm"
                    autoComplete="username"
                  />
                </div>

                {/* Senha */}
                <div className="animate-slide-up delay-3 mb-5">
                  <div className="flex items-center justify-between mb-2">
                    <label className="text-xs font-medium"
                      style={{color:'rgba(255,255,255,0.55)', letterSpacing:'0.06em', textTransform:'uppercase'}}>
                      Senha
                    </label>
                    <button type="button"
                      className="text-xs transition-colors"
                      style={{color:'rgba(51,136,245,0.8)'}}
                      onClick={() => alert('Função em desenvolvimento')}>
                      Esqueceu a senha?
                    </button>
                  </div>
                  <div className="relative">
                    <input
                      type={showPass ? 'text' : 'password'}
                      value={password}
                      onChange={e => setPassword(e.target.value)}
                      placeholder="••••••••"
                      className="input-field w-full rounded-xl px-4 py-3 text-sm pr-11"
                      autoComplete="current-password"
                    />
                    <button
                      type="button"
                      onClick={() => setShowPass(v => !v)}
                      className="absolute right-3 top-1/2 -translate-y-1/2 transition-colors"
                      style={{color:'rgba(255,255,255,0.35)'}}>
                      <EyeIcon open={showPass} />
                    </button>
                  </div>
                </div>

                {/* Error message */}
                {error && (
                  <div className="animate-slide-up mb-4 flex items-center gap-2 rounded-xl px-4 py-3 text-sm"
                    style={{background:'rgba(239,68,68,0.12)', border:'1px solid rgba(239,68,68,0.3)', color:'#fca5a5'}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                      <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    {error}
                  </div>
                )}

                {/* Submit */}
                <div className="animate-slide-up delay-4">
                  <button
                    type="submit"
                    disabled={loading}
                    className="btn-primary w-full rounded-xl py-3 text-sm font-semibold text-white flex items-center justify-center gap-2">
                    {loading ? (
                      <>
                        <div className="spinner"></div>
                        Entrando…
                      </>
                    ) : (
                      <>
                        Entrar no sistema
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                          <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                      </>
                    )}
                  </button>
                </div>

              </form>
            </div>

            {/* Footer */}
            <div className="animate-slide-up delay-4 text-center mt-6">
              <p className="text-xs" style={{color:'rgba(255,255,255,0.2)'}}>
                © 2026 Morada do Sol · Desenvolvido por Guilherme Bello
              </p>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LoginPage />);
  </script>
</body>
</html>
